%dev.quarkus.http.port=9040
%dev.quarkus.management.port=9050

#quarkus.http.host=0.0.0.0
quarkus.http.port=8080
quarkus.management.enabled=true
#quarkus.management.host=0.0.0.0
quarkus.management.port=9000

# Swagger/OpenAPI configuration for production
quarkus.smallrye-openapi.enable=true
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.title=ValidPlate Mservice API
quarkus.swagger-ui.version=1.0.0
# Keep OpenAPI/Swagger on main application interface, not management
quarkus.smallrye-openapi.management.enabled=false

# Container Image Configuration
quarkus.container-image.builder=docker
quarkus.container-image.registry=ghcr.io
