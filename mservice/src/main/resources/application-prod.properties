# Swagger/OpenAPI configuration for production
quarkus.smallrye-openapi.enable=true
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.title=ValidPlate Mservice API
quarkus.swagger-ui.version=1.0.0

# Optional: Customize OpenAPI spec
quarkus.openapi.schema.default-produces=application/json
quarkus.openapi.schema.default-consumes=application/json
