name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build with Gradle except mservice
      run: ./gradlew build -x :mservice:build
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build with Gradle mservice and Push Quarkus Container Image
      run: ./gradlew :mservice:build \
        -Pquarkus.container-image.build=true \
        -Pquarkus.container-image.push=true \
        -Pquarkus.container-image.registry=ghcr.io \
        -Pquarkus.container-image.group=${{ github.repository_owner }} \
        -Pquarkus.container-image.name=validplate-mservice \
        -Pquarkus.container-image.tag=latest
    
